<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 - Accès interdit</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0a; font-family:'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; color:#fff; }
    .container { text-align:center; max-width:500px; padding:2rem; }
    .code { font-size:7rem; font-weight:900; color:#1a1a1a; line-height:1; letter-spacing:8px; }
    .divider { width:50px; height:2px; background:#e67e22; margin:1.5rem auto; }
    .msg { font-size:0.85rem; color:#555; text-transform:uppercase; letter-spacing:3px; margin-bottom:0.5rem; }
    .desc { font-size:0.7rem; color:#333; letter-spacing:1px; }
    .btn { display:inline-block; margin-top:3rem; padding:0.7rem 2rem; border:1px solid #333; color:#666; font-size:0.75rem; text-transform:uppercase; letter-spacing:2px; text-decoration:none; transition:all 0.3s; }
    .btn:hover { border-color:#e67e22; color:#e67e22; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">403</div>
    <div class="divider"></div>
    <div class="msg">Accès interdit</div>
    <div class="desc">Vous n'êtes pas autorisé à accéder à cette ressource.</div>
    <a href="index.html" class="btn">Retour au site</a>
  </div>
</body>
</html>
